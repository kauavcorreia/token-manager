version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: token-manager-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: token_manager
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: token-manager-backend
    environment:
      DATABASE_URL: mysql://root:password@mysql:3306/token_manager
      NODE_ENV: development
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run start:dev

  # React Frontend (optional in compose, usually run locally)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: token-manager-frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     VITE_API_URL: http://localhost:3001
  #     VITE_WS_URL: ws://localhost:3001
  #   volumes:
  #     - ./frontend/src:/app/src

volumes:
  mysql_data:
    driver: local
